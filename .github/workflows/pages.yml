name: Deploy Replay to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Validate browser modules
        run: |
          node --check static/app.js
          node --check static/config.js
          node --check static/lib/engine-providers.js
          node --check static/lib/game-import.js
          node --check static/lib/profile-store.js
          node --check static/lib/analysis-board.js
          node --check static/lib/brilliancy.js
          node --check static/lib/masters.js
          node --test tests/brilliancy.test.mjs
      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: static
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
